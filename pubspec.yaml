name: family_finance_zakat
description: Family Finance & Zakat Manager - Offline First
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Database - Drift ORM
  drift: ^2.14.1
  drift_flutter: ^0.1.0

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Google Drive Backup
  google_sign_in: ^6.2.1
  googleapis: ^12.0.0
  http: ^1.2.0

  # Security / Auth
  local_auth: ^2.1.8
  flutter_secure_storage: ^9.0.0

  # PDF Generation
  pdf: ^3.10.7
  printing: ^5.12.0

  # Charts
  fl_chart: ^0.67.0

  # File handling & ZIP
  archive: ^3.4.10
  path_provider: ^2.1.2
  path: ^1.9.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3
  share_plus: ^7.2.2
  open_file: ^3.3.2
  file_picker: ^8.0.3
  image_picker: ^1.0.7

  # UI Components
  flutter_staggered_grid_view: ^0.7.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # Lucky Draw/Spin Wheel
  wheel_picker: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  drift_dev: ^2.14.1
  riverpod_generator: ^2.3.9
  custom_lint: ^0.6.3
  riverpod_lint: ^2.3.7

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: NotoNastaliqUrdu
      fonts:
        - asset: assets/fonts/NotoNastaliqUrdu-Regular.ttf
