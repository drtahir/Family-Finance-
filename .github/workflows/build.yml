name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'

      - name: Fix pubspec.yaml fonts section
        run: |
          python3 << 'EOF'
          import re
          with open('pubspec.yaml', 'r') as f:
              content = f.read()
          content = re.sub(r'\s+fonts:[\s\S]*?(?=\n\w|\Z)', '', content)
          with open('pubspec.yaml', 'w') as f:
              f.write(content)
          print("Done. pubspec.yaml content:")
          print(content)
          EOF

      - name: Create asset folders
        run: mkdir -p assets/images assets/icons assets/fonts

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate Drift database code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Debug APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Family-Finance-APK
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
