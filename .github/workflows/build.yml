name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'

      - name: Create asset folders
        run: mkdir -p assets/images assets/icons assets/fonts

      - name: Remove Urdu font from pubspec
        run: |
          sed -i '/NotoNastaliqUrdu/d' pubspec.yaml
          sed -i '/NotoNastaliqUrdu-Regular.ttf/d' pubspec.yaml

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate Drift database code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Debug APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Family-Finance-Debug-APK
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
